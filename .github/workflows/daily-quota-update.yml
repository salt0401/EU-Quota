name: Daily quota update

# Scrapes EU TARIC + UK Trade Tariff every morning and publishes the results:
#   - quota_history_<YEAR>.csv + metadata.json -> committed to data/published/
#     (one history file per calendar year)
#   - the workbooks                            -> rolling release assets
#     ("latest-data" release; keeps daily xlsx blobs out of git history)
# The colleague-facing downloader fetches both over public URLs (repo must
# stay PUBLIC — that is what makes anonymous downloads work).
#
# 05:30 UTC ~ after the UK Trade Tariff daily refresh and the TARIC morning
# allocation, before European business hours. Runs every day: EU balances
# move on weekends too. GitHub cron can fire up to ~15 min late.
#
# RUNBOOK: see docs/DAILY_UPDATE_RUNBOOK.md (failures open a GitHub issue).

on:
  schedule:
    - cron: '30 5 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

concurrency:
  group: daily-quota-update
  cancel-in-progress: false

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install dependencies
        run: pip install -r requirements-ci.txt pytest

      - name: Sanity-test the publish pipeline before scraping
        run: python -m pytest tests/test_publisher.py tests/test_downloader.py tests/test_data_processor.py -q

      - name: Scrape quotas and publish data
        run: python run.py --publish

      # Assets go up BEFORE metadata is pushed: an asset metadata doesn't yet
      # name is inert, but pushed metadata naming a not-yet-uploaded asset
      # would 404 in the downloader (bites on the first run of each year,
      # when the new year's workbook name doesn't exist on the release yet).
      - name: Publish workbooks as rolling release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view latest-data >/dev/null 2>&1 || \
            gh release create latest-data \
              --title "Latest quota data" \
              --notes "Rolling data release — assets are overwritten every day by the Daily quota update workflow. Use MEPS_Quota_Downloader.exe (or download.py) to fetch them." \
              --latest=false
          gh release upload latest-data \
            data/published/MEPS_Quota_Update_latest.xlsx \
            data/published/Quota_History_*.xlsx \
            --clobber

      - name: Commit published data (csv + metadata only)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/published/quota_history_*.csv data/published/metadata.json
          if git diff --cached --quiet; then
            echo "No data changes to publish."
          else
            git commit -m "data: daily quota update $(date -u +%F)"
            # tolerate a manual push that landed while we were scraping
            git pull --rebase origin main || { git rebase --abort; git pull --rebase -X theirs origin main; }
            git push origin main
          fi

      - name: Upload scrape output as artifact (for recovery)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-run-output
          path: |
            data/published/
            data/output/
          retention-days: 14
          if-no-files-found: ignore

      - name: Open or update tracking issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          EXISTING=$(gh issue list --state open --search 'Daily quota update failing in:title' --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "Failed again on $(date -u +%F): $RUN_URL"
          else
            gh issue create \
              --title "Daily quota update failing" \
              --body "The scheduled quota scrape failed on $(date -u +%F). Run: $RUN_URL — see docs/DAILY_UPDATE_RUNBOOK.md. Colleagues' downloads keep serving the LAST successful day until this is fixed. Note: if the workflow keeps failing with no commits for ~60 days, GitHub disables the schedule (re-enable under the Actions tab)."
          fi

      - name: Run summary
        if: always()
        run: |
          echo '## Daily quota update' >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ job.status }}" != "success" ]; then
            echo '> :warning: **This run FAILED — any metadata below is from the last successful run, not this one.**' >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f data/published/metadata.json ]; then
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat data/published/metadata.json >> "$GITHUB_STEP_SUMMARY"
            echo '' >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
